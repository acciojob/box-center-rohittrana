<!DOCTYPE html>
<html>
<head>
    <title>Box Center</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border: 2px solid black;

            /* Center the box on the page */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .box p {
            /* Center the text inside the box */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: purple;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <p>This is center.</p>
    </div>
</body>
</html>
